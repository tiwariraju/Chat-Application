<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room | Chat App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="chat-bg">
<div class="container-fluid py-3">
    <div class="row g-3 chat-layout">
        <div class="col-lg-3 col-md-4">
            <div class="card h-100 shadow-sm border-0 rounded-4">
                <div class="card-header bg-white rounded-top-4 d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">Active Users</h6>
                    <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Logout</button>
                </div>
                <ul id="activeUsers" class="list-group list-group-flush rounded-bottom-4"></ul>
            </div>
        </div>

        <div class="col-lg-9 col-md-8">
            <div class="card h-100 shadow-sm border-0 rounded-4 d-flex flex-column">
                <div class="card-header bg-white rounded-top-4">
                    <h6 class="mb-0">Global Chat Room</h6>
                    <small class="text-muted" id="currentUserLabel"></small>
                </div>
                <div class="card-body chat-body" id="chatMessages"></div>
                <div class="card-footer bg-white rounded-bottom-4">
                    <form id="messageForm" class="d-flex gap-2">
                        <input id="messageInput" type="text" class="form-control" placeholder="Type your message..." required>
                        <button class="btn btn-primary px-4" type="submit">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
